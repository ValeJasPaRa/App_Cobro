<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobros WhatsApp 💸</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #25D366;
    --green-dark: #128C7E;
    --green-light: #dcfce7;
    --yellow: #FFD700;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #777;
    --yape: #6B21A8;
    --yape-light: #9333EA;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .app {
    width: 100%;
    max-width: 480px;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 18px;
    border-radius: 100px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  h1 {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--green); }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  input, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus {
    border-color: var(--green);
  }

  input::placeholder, textarea::placeholder {
    color: #444;
  }

  textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
  }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .prefix-input {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .prefix-input:focus-within { border-color: var(--green); }

  .prefix {
    padding: 12px 10px 12px 14px;
    color: var(--muted);
    font-size: 15px;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    border-right: 1px solid var(--border);
  }

  .prefix-input input {
    border: none;
    border-radius: 0;
    background: transparent;
    padding-left: 10px;
  }

  .prefix-input input:focus { border-color: transparent; }

  .hint {
    font-size: 11px;
    color: #555;
    margin-top: 5px;
  }

  .btn-send {
    width: 100%;
    padding: 16px;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s, transform 0.1s;
    margin-top: 1.5rem;
  }

  .btn-send:hover { background: #20bd5a; }
  .btn-send:active { transform: scale(0.98); }

  .btn-send svg { flex-shrink: 0; }

  /* Result */
  .result {
    display: none;
    background: var(--surface);
    border: 1px solid #25D36633;
    border-radius: 16px;
    padding: 1.5rem;
    margin-top: 1rem;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .preview-bubble {
    background: #1a2e1a;
    border: 1px solid #25D36622;
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.6;
    color: #c8e6c9;
    margin-bottom: 1rem;
    font-family: 'Space Grotesk', sans-serif;
    white-space: pre-wrap;
  }

  .yape-preview {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--yape);
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 1rem;
  }

  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .btn-action {
    padding: 11px;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-wa {
    background: var(--green);
    color: #000;
    border-color: var(--green);
  }

  .btn-wa:hover { background: #20bd5a; }

  .btn-copy {
    background: var(--surface2);
    color: var(--text);
  }

  .btn-copy:hover { background: #2a2a2a; }

  .footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 12px;
    color: #333;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <span class="logo-dot"></span>
      Sistema de cobros
    </div>
    <h1>Cobros por<br><span>WhatsApp</span> 💸</h1>
    <p class="subtitle">Genera tu mensaje de cobro con link de Yape en segundos</p>
  </div>

  <!-- Config card -->
  <div class="card">
    <div class="card-title">⚙️ Tu configuración</div>
    <div class="field">
      <label>Tu número de Yape (fijo)</label>
      <div class="prefix-input">
        <span class="prefix">+51</span>
        <input type="tel" id="yape_num" placeholder="987654321" maxlength="9" />
      </div>
      <p class="hint">El dinero siempre llega a este número</p>
    </div>
  </div>

  <!-- Cobro card -->
  <div class="card">
    <div class="card-title">📋 Datos del cobro</div>
    <div class="field">
      <label>Número del cliente</label>
      <div class="prefix-input">
        <span class="prefix">+51</span>
        <input type="tel" id="client_num" placeholder="912345678" maxlength="9" />
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Monto (S/.)</label>
        <input type="number" id="amount" placeholder="0.00" min="0" step="0.50" />
      </div>
      <div class="field">
        <label>Producto</label>
        <input type="text" id="product" placeholder="Ej: cucharas" />
      </div>
    </div>
    <div class="field">
      <label>Mensaje personalizado <span style="color:#444">(opcional)</span></label>
      <textarea id="custom_msg" placeholder="Déjalo vacío para usar el mensaje automático..."></textarea>
    </div>
  </div>

  <button class="btn-send" onclick="generate()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.08 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.09a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 15z"/>
    </svg>
    Generar y abrir WhatsApp
  </button>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-label">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
      Vista previa del mensaje
    </div>
    <div class="preview-bubble" id="preview_text"></div>
    <div class="yape-preview">
      💛 Pagar con Yape → <span id="yape_num_preview"></span>
    </div>
    <div class="actions">
      <button class="btn-action btn-wa" onclick="openWA()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.528 5.855L.057 23.405a.75.75 0 00.917.932l5.688-1.49A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.693 9.693 0 01-4.953-1.356l-.355-.211-3.676.964.981-3.584-.232-.368A9.693 9.693 0 012.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>
        Abrir WhatsApp
      </button>
      <button class="btn-action btn-copy" onclick="copyLink(this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copiar link
      </button>
    </div>
  </div>

  <div class="footer">Hecho con ❤️ — solo genera links, no guarda nada</div>
</div>

<script>
let waLink = '';

// ⚠️ Cambia esto por tu URL de GitHub Pages cuando lo subas
const BASE_URL = 'https://TUUSUARIO.github.io/cobros-whatsapp/pagar.html';

function generate() {
  const yape = document.getElementById('yape_num').value.trim();
  const client = document.getElementById('client_num').value.trim();
  const amount = document.getElementById('amount').value.trim();
  const product = document.getElementById('product').value.trim();
  const custom = document.getElementById('custom_msg').value.trim();

  if (!yape || yape.length < 9) return alert('Ingresa tu número de Yape (9 dígitos)');
  if (!client || client.length < 9) return alert('Ingresa el número del cliente (9 dígitos)');
  if (!amount || parseFloat(amount) <= 0) return alert('Ingresa el monto a cobrar');

  const monto = parseFloat(amount).toFixed(2);
  const prod = product ? product : 'pedido';

  // Link a la página intermedia con los datos como parámetros
  const pagoLink = `${BASE_URL}?phone=${yape}&monto=${monto}&producto=${encodeURIComponent(prod)}&negocio=Tienda`;

  const msg = custom || `Hola! 👋 Tiene un pago pendiente de *S/. ${monto}* por *${prod}*.\n\nPresione el botón para pagar con Yape 👇\n${pagoLink}`;

  waLink = `https://wa.me/51${client}?text=${encodeURIComponent(msg)}`;

  document.getElementById('preview_text').textContent = msg;
  document.getElementById('yape_num_preview').textContent = `+51 ${yape}`;

  const result = document.getElementById('result');
  result.style.display = 'block';
  result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  window.open(waLink, '_blank');
}

function openWA() {
  if (waLink) window.open(waLink, '_blank');
}

function copyLink(btn) {
  if (!waLink) return;
  navigator.clipboard.writeText(waLink).then(() => {
    btn.textContent = '✓ Copiado!';
    setTimeout(() => {
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar link`;
    }, 2000);
  });
}
</script>
</body>
</html>
